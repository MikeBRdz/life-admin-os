workflows:
  ios-debug:
    name: iOS Debug Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
      - name: Flutter build ios
        script: |
          flutter build ios --debug --no-codesign --workspace ios/Runner.xcworkspace --scheme Runner
    artifacts:
      - build/ios/iphoneos/*.app